<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create User</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

  <h2>Create User</h2>

  <form id="createForm">
    <input type="text" id="name" class="form-control mb-3" placeholder="Name" required>
    <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>
    <input type="number" id="age" class="form-control mb-3" placeholder="Age (optional)">

    <button class="btn btn-success">Create</button>
  </form>

  <p id="message" class="mt-3"></p>

  <script src="/index.js"></script>
  <script src="/create.js"></script>
</body>
</html>
