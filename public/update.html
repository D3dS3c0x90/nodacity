<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Update User</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

  <h2>Update User</h2>

  <form id="updateForm">
    <input type="text" id="id" class="form-control mb-3" placeholder="User ID" required>
    <input type="text" id="name" class="form-control mb-3" placeholder="New Name" required>
    <input type="email" id="email" class="form-control mb-3" placeholder="New Email" required>

    <button class="btn btn-warning">Update</button>
  </form>

  <p id="message" class="mt-3"></p>

  <script src="index.js"></script>
  <script src="errorPopup.js"></script>
  <script src="update.js"></script>
</body>
</html>
